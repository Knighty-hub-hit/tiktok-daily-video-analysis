name: Daily data refresh

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      report_url:
        description: Optional one-time XLSX report URL
        required: false
        type: string
  schedule:
    # 09:13 Beijing time = 01:13 UTC. Avoid GitHub Actions top-of-hour schedule drops.
    - cron: "13 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      REPORT_URL: ${{ github.event.inputs.report_url || secrets.TIKTOK_REPORT_URL }}
      FEISHU_SHEET_URL: ${{ secrets.FEISHU_SHEET_URL }}
      FEISHU_SHEET_NAME: ${{ secrets.FEISHU_SHEET_NAME }}
      FEISHU_SHEET_ID: ${{ secrets.FEISHU_SHEET_ID }}
      FEISHU_SPREADSHEET_TOKEN: ${{ secrets.FEISHU_SPREADSHEET_TOKEN }}
      FEISHU_APP_ID: ${{ secrets.LARK_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      LARK_TARGET_CHAT_ID: ${{ secrets.LARK_TARGET_CHAT_ID }}
      LARK_TARGET_CHAT_NAME: ${{ secrets.LARK_TARGET_CHAT_NAME || '墨区小组' }}
      TIKTOK_EXPORT_PAGE_URL: ${{ secrets.TIKTOK_EXPORT_PAGE_URL }}
      TIKTOK_STORAGE_STATE_B64: ${{ secrets.TIKTOK_STORAGE_STATE_B64 }}
      TIKTOK_LOGIN_USERNAME: ${{ secrets.TIKTOK_LOGIN_USERNAME }}
      TIKTOK_LOGIN_EMAIL: ${{ secrets.TIKTOK_LOGIN_EMAIL }}
      TIKTOK_LOGIN_PASSWORD: ${{ secrets.TIKTOK_LOGIN_PASSWORD }}
      SITE_PUBLIC_URL: https://xinchimcn.aiforce.cloud/app/app_179t4tka49p
      SITE_BACKUP_URL: https://knighty-hub-hit.github.io/tiktok-daily-video-analysis/
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Check data source
        id: source
        shell: bash
        run: |
          has_feishu_target=false
          if [ -n "$FEISHU_SHEET_URL" ] || [ -n "$FEISHU_SPREADSHEET_TOKEN" ]; then
            has_feishu_target=true
          fi

          has_feishu_auth=false
          if { [ -n "$FEISHU_APP_ID" ] || [ -n "$LARK_APP_ID" ]; } && { [ -n "$FEISHU_APP_SECRET" ] || [ -n "$LARK_APP_SECRET" ]; }; then
            has_feishu_auth=true
          fi

          has_tiktok_browser=false
          if [ -n "$TIKTOK_STORAGE_STATE_B64" ]; then
            has_tiktok_browser=true
          fi
          if { [ -n "$TIKTOK_LOGIN_USERNAME" ] || [ -n "$TIKTOK_LOGIN_EMAIL" ]; } && [ -n "$TIKTOK_LOGIN_PASSWORD" ]; then
            has_tiktok_browser=true
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=existing" >> "$GITHUB_OUTPUT"
            echo "Using committed site data for push deployment."
          elif [ -n "$REPORT_URL" ] && [ "$has_feishu_target" = "true" ] && [ "$has_feishu_auth" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=report" >> "$GITHUB_OUTPUT"
            echo "Using TikTok report URL, then syncing Feishu before building the site."
          elif [ -n "$REPORT_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=report-only" >> "$GITHUB_OUTPUT"
            echo "Using TikTok report URL without Feishu sync because Feishu settings are incomplete."
          elif [ "$has_tiktok_browser" = "true" ] && [ "$has_feishu_target" = "true" ] && [ "$has_feishu_auth" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=browser" >> "$GITHUB_OUTPUT"
            echo "Using saved TikTok browser session to export the report, then syncing Feishu before building the site."
          elif [ "$has_tiktok_browser" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=browser-only" >> "$GITHUB_OUTPUT"
            echo "Using saved TikTok browser session without Feishu sync because Feishu settings are incomplete."
          elif [ "${{ github.event_name }}" != "push" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "mode=missing-report" >> "$GITHUB_OUTPUT"
            echo "::error::Missing TikTok report source. Set TIKTOK_REPORT_URL, dispatch with report_url, set TIKTOK_STORAGE_STATE_B64, or set TIKTOK_LOGIN_USERNAME/TIKTOK_LOGIN_PASSWORD for browser export; refusing to republish stale Feishu-only data."
            exit 1
          elif [ "$has_feishu_target" = "true" ] && [ "$has_feishu_auth" = "true" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=feishu" >> "$GITHUB_OUTPUT"
            echo "Using Feishu sheet as the daily source."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No data source configured. Set FEISHU_SHEET_URL plus FEISHU_APP_ID/FEISHU_APP_SECRET, or set TIKTOK_REPORT_URL."
          fi

      - name: Install dependencies
        if: steps.source.outputs.configured == 'true'
        run: npm ci

      - name: Download TikTok report
        if: steps.source.outputs.mode == 'report' || steps.source.outputs.mode == 'report-only'
        env:
          TIKTOK_REPORT_AUTHORIZATION: ${{ secrets.TIKTOK_REPORT_AUTHORIZATION }}
          TIKTOK_REPORT_COOKIE: ${{ secrets.TIKTOK_REPORT_COOKIE }}
          TIKTOK_REPORT_OUTPUT: data/exports/tiktok-report-${{ github.run_id }}.xlsx
          TIKTOK_REPORT_URL: ${{ env.REPORT_URL }}
        run: npm run report:download

      - name: Install Playwright Chromium
        if: steps.source.outputs.mode == 'browser' || steps.source.outputs.mode == 'browser-only'
        run: npx playwright install --with-deps chromium

      - name: Restore TikTok browser session
        if: steps.source.outputs.mode == 'browser' || steps.source.outputs.mode == 'browser-only'
        shell: bash
        run: |
          mkdir -p .auth
          if [ -n "$TIKTOK_STORAGE_STATE_B64" ]; then
            printf '%s' "$TIKTOK_STORAGE_STATE_B64" | base64 -d > .auth/tiktok-storage-state.json
          fi

      - name: Export TikTok report with browser
        if: steps.source.outputs.mode == 'browser' || steps.source.outputs.mode == 'browser-only'
        env:
          TIKTOK_REPORT_OUTPUT: data/exports/tiktok-report-${{ github.run_id }}.xlsx
          TIKTOK_STORAGE_STATE_PATH: .auth/tiktok-storage-state.json
        run: npm run tiktok:export-browser

      - name: Import site data
        if: steps.source.outputs.mode == 'report-only' || steps.source.outputs.mode == 'browser-only'
        run: npm run data:import -- data/exports/tiktok-report-${{ github.run_id }}.xlsx

      - name: Prepare Feishu rows from TikTok report
        if: steps.source.outputs.mode == 'report' || steps.source.outputs.mode == 'browser'
        env:
          TIKTOK_IMPORT_MODE: rolling-days
          TIKTOK_ROLLING_LOOKBACK_DAYS: 3
        run: npm run feishu:prepare -- data/exports/tiktok-report-${{ github.run_id }}.xlsx data/tiktok-feishu-latest.json

      - name: Sync TikTok report into Feishu sheet
        id: sync_feishu
        if: steps.source.outputs.mode == 'report' || steps.source.outputs.mode == 'browser'
        continue-on-error: true
        run: npm run feishu:sync -- data/tiktok-feishu-latest.json

      - name: Import Feishu sheet data
        if: steps.source.outputs.mode == 'feishu' || ((steps.source.outputs.mode == 'report' || steps.source.outputs.mode == 'browser') && steps.sync_feishu.outcome == 'success')
        run: npm run feishu:import

      - name: Import site data from TikTok report fallback
        if: (steps.source.outputs.mode == 'report' || steps.source.outputs.mode == 'browser') && steps.sync_feishu.outcome != 'success'
        run: npm run data:import -- data/exports/tiktok-report-${{ github.run_id }}.xlsx

      - name: Enrich latest video media
        if: steps.source.outputs.configured == 'true' && github.event_name != 'push'
        continue-on-error: true
        env:
          TIKTOK_MEDIA_ENRICH_LIMIT: 30
        run: npm run media:enrich -- --latest-date

      - name: Build public site
        if: steps.source.outputs.configured == 'true'
        run: npm run pages:build

      - name: Save refreshed data
        if: steps.source.outputs.configured == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-videos.json data/site-dashboard.json public/covers
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh TikTok data [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        if: steps.source.outputs.configured == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.source.outputs.configured == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

      - name: Deploy to GitHub Pages
        if: steps.source.outputs.configured == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Feishu group
        if: steps.source.outputs.configured == 'true' && github.event_name != 'push'
        env:
          SITE_BACKUP_URL: ${{ steps.deployment.outputs.page_url || env.SITE_BACKUP_URL }}
        run: npm run feishu:notify

      - name: Notify Feishu workflow failure
        if: failure() && github.event_name != 'push'
        env:
          WORKFLOW_SOURCE_MODE: ${{ steps.source.outputs.mode }}
        run: node scripts/send-feishu-workflow-alert.mjs
