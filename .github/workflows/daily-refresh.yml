name: Daily data refresh

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      report_url:
        description: Optional one-time XLSX report URL
        required: false
        type: string
  schedule:
    # Run after the 09:30 local TikTok export has refreshed Feishu.
    - cron: "0 10 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      REPORT_URL: ${{ github.event.inputs.report_url || secrets.TIKTOK_REPORT_URL }}
      FEISHU_SHEET_URL: ${{ secrets.FEISHU_SHEET_URL }}
      FEISHU_SHEET_NAME: ${{ secrets.FEISHU_SHEET_NAME }}
      FEISHU_SHEET_ID: ${{ secrets.FEISHU_SHEET_ID }}
      FEISHU_SPREADSHEET_TOKEN: ${{ secrets.FEISHU_SPREADSHEET_TOKEN }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
    steps:
      - name: Check data source
        id: source
        shell: bash
        run: |
          if [ -n "$REPORT_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=report" >> "$GITHUB_OUTPUT"
            echo "Using one-time or configured TikTok report URL."
          elif [ -n "$FEISHU_SHEET_URL" ] && { [ -n "$FEISHU_APP_ID" ] || [ -n "$LARK_APP_ID" ]; } && { [ -n "$FEISHU_APP_SECRET" ] || [ -n "$LARK_APP_SECRET" ]; }; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=feishu" >> "$GITHUB_OUTPUT"
            echo "Using Feishu sheet as the daily source."
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "mode=existing" >> "$GITHUB_OUTPUT"
            echo "Using committed site data for push deployment."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No data source configured. Set FEISHU_SHEET_URL plus FEISHU_APP_ID/FEISHU_APP_SECRET, or set TIKTOK_REPORT_URL."
          fi

      - name: Check out repository
        if: steps.source.outputs.configured == 'true'
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: steps.source.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.source.outputs.configured == 'true'
        run: npm ci

      - name: Download TikTok report
        if: steps.source.outputs.mode == 'report'
        env:
          TIKTOK_REPORT_AUTHORIZATION: ${{ secrets.TIKTOK_REPORT_AUTHORIZATION }}
          TIKTOK_REPORT_COOKIE: ${{ secrets.TIKTOK_REPORT_COOKIE }}
          TIKTOK_REPORT_OUTPUT: data/exports/tiktok-report-${{ github.run_id }}.xlsx
          TIKTOK_REPORT_URL: ${{ env.REPORT_URL }}
        run: npm run report:download

      - name: Import site data
        if: steps.source.outputs.mode == 'report'
        run: npm run data:import -- data/exports/tiktok-report-${{ github.run_id }}.xlsx

      - name: Import Feishu sheet data
        if: steps.source.outputs.mode == 'feishu'
        run: npm run feishu:import

      - name: Build public site
        if: steps.source.outputs.configured == 'true'
        run: npm run pages:build

      - name: Save refreshed data
        if: steps.source.outputs.configured == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-videos.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh TikTok data [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        if: steps.source.outputs.configured == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.source.outputs.configured == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

      - name: Deploy to GitHub Pages
        if: steps.source.outputs.configured == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
